version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-reguvigil}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-reguvigil}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reguvigil} -d ${POSTGRES_DB:-reguvigil}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-reguvigil}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-reguvigil}
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  scheduler:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: python -m scheduler.regulatory_poller
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-reguvigil}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-reguvigil}
